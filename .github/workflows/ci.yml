name: CI

on:
  push:
    branches:
      - main
      - stable
      - beta
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate:
    name: Validate integration
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Home Assistant runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install homeassistant==2025.1.0 numpy

      - name: Run unit tests without live credentials
        run: |
          python -m unittest discover -s tests

      - name: Validate JSON files
        run: |
          python -m json.tool hacs.json > /dev/null
          python -m json.tool custom_components/loxone_home_assistant/manifest.json > /dev/null
          python -m json.tool custom_components/loxone_home_assistant/translations/en.json > /dev/null
          python -m json.tool custom_components/loxone_home_assistant/translations/pl.json > /dev/null

      - name: Import integration modules
        run: |
          python - <<'PY'
          import importlib

          modules = [
              "custom_components.loxone_home_assistant",
              "custom_components.loxone_home_assistant.binary_sensor",
              "custom_components.loxone_home_assistant.bridge",
              "custom_components.loxone_home_assistant.button",
              "custom_components.loxone_home_assistant.camera",
              "custom_components.loxone_home_assistant.climate",
              "custom_components.loxone_home_assistant.config_flow",
              "custom_components.loxone_home_assistant.const",
              "custom_components.loxone_home_assistant.cover",
              "custom_components.loxone_home_assistant.entity",
              "custom_components.loxone_home_assistant.light",
              "custom_components.loxone_home_assistant.media_player",
              "custom_components.loxone_home_assistant.models",
              "custom_components.loxone_home_assistant.number",
              "custom_components.loxone_home_assistant.parser",
              "custom_components.loxone_home_assistant.sensor",
              "custom_components.loxone_home_assistant.switch",
              "custom_components.loxone_home_assistant.text",
          ]

          for module_name in modules:
              importlib.import_module(module_name)
              print(f"Imported {module_name}")
          PY

      - name: Compile Python sources
        run: |
          python -m compileall -q custom_components/loxone_home_assistant
